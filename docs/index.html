<!DOCTYPE html>
<head>
    <title>TurtleBot</title>
    <link rel="icon" type="image/png" href="./images/turtle.png"/>

    <meta charset="UTF-8"/>
    <meta name="description" content="A Discord and Guilded bot all about turtles!"/>
    <meta name="keywords" content="Turtles, Discord, Guilded, Bot"/>
    <meta name="author" content="SSSpencer413"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="application-name" content="TurtleBot"/>

    <link rel="stylesheet" href="./css/styles.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rubik"/>

</head>

<body>
    <div class="root">
        <header>
            <nav>
                <ul>
                    <li>
                        <a href="/" class = "logo">
                            <svg width = "200px" height = "50px">
                                <image href="./images/turtle.svg" width = "50" height = "50"/>
                                <text x="60" y="35" fill="white" style="font-family: 'Rubik', sans-serif; font-size:2.75vh">TurtleBot</text>
                            </svg>
                        </a>
                    </li>

                    <li>
                        <a href="#">Commands</a>
                    </li>

                    <li>
                        <a href="#">Support</a>
                    </li>

                    <li>
                        <a href="https://discord.com/api/oauth2/authorize?client_id=481430759349944330&permissions=412317173760&scope=applications.commands%20bot">
                            <p style="display: inline-block; vertical-align: middle; padding: 0 1vw;">
                                <img src="./images/discordLogo.svg" width="30vh" style="vertical-align: middle; padding: 0 1vh"/>
                                Invite
                            </p> 
                        </a>
                    </li>

                    <li>
                        <a href="https://www.guilded.gg/b/a3a8b6d6-8e6a-4098-819e-92f3467f25f6">
                            <img src="./images/guildedLogo.svg" width="50vh" style="vertical-align: middle; padding: 0;"/>
                            <p style="display: inline; vertical-align: middle; padding: 0;">
                                Invite
                            </p> 
                        </a>
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <p>
                There's nothing here right now, but go invite me on <a href="https://discord.com/api/oauth2/authorize?client_id=481430759349944330&permissions=412317173760&scope=applications.commands%20bot">Discord</a> and <a href="https://www.guilded.gg/b/a3a8b6d6-8e6a-4098-819e-92f3467f25f6">Guilded</a>!
            </p>
            <p>
                Other than that, stay tuned for this website!
            </p>
        </main>
    </div>
</body>
